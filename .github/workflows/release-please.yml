# Automated semantic-versioned releases driven by Conventional Commits.
#
# Flow:
#   1. Every push to `main` runs release-please-action, which inspects
#      commit messages since the last release tag and either creates or
#      updates a `chore(main): release X.Y.Z` PR.
#   2. When you merge that Release PR, release-please cuts a git tag
#      (`vX.Y.Z`), publishes a GitHub Release with auto-generated
#      changelog, and writes both into the manifest file.
#   3. The `build-and-push` job below sees `release_created == true` and
#      builds + pushes versioned multi-arch images to GHCR.
#
# Conventional commit → version bump:
#   feat:      → minor
#   fix:       → patch
#   feat!:     → major (or any commit with `BREAKING CHANGE:` footer)
#   chore:, docs:, ci:, refactor:, test:, build:, perf:, style:
#              → no bump (still listed in the changelog)

name: Release please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-push:
    name: Publish ${{ matrix.image.name }} (${{ needs.release-please.outputs.tag_name }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: plugtrack-api
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: plugtrack-ui
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          provenance: false
