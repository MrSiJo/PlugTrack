# Automated semantic-versioned releases driven by Conventional Commits.
#
# Flow:
#   1. Every push to `main` runs release-please-action, which inspects
#      commit messages since the last release tag and either creates or
#      updates a `chore(main): release X.Y.Z` PR.
#   2. When you merge that Release PR, release-please cuts a git tag
#      (`vX.Y.Z`), publishes a GitHub Release with auto-generated
#      changelog, and writes both into the manifest file.
#   3. This workflow then dispatches `build-images.yml` against the new
#      tag, which publishes the versioned multi-arch images to GHCR
#      (:X.Y.Z, :X.Y, :X, :latest). NOTE: we dispatch explicitly because a
#      tag created by the default GITHUB_TOKEN cannot itself trigger another
#      workflow (GitHub's anti-recursion rule).
#
# Conventional commit → version bump:
#   feat:      → minor
#   fix:       → patch
#   feat!:     → major (or any commit with `BREAKING CHANGE:` footer)
#   chore:, docs:, ci:, refactor:, test:, build:, perf:, style:
#              → no bump (still listed in the changelog)

name: Release please

on:
  push:
    branches: [main]
    paths-ignore:
      - scripts/**
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write # needed to dispatch build-images.yml after a release is cut

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please cut the tag with the default GITHUB_TOKEN, and GitHub's
      # anti-recursion rule blocks that tag push from triggering build-images.yml.
      # Dispatch it explicitly so the versioned GHCR images publish hands-off.
      # (A workflow_dispatch started via GITHUB_TOKEN IS allowed to launch a run.)
      - name: Publish versioned images for the new release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-images.yml --ref "${{ steps.release.outputs.tag_name }}" -R "${{ github.repository }}"
