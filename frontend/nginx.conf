# PlugTrack SPA + API proxy.
#
# Serves the Vite-built bundle from /usr/share/nginx/html and reverse-
# proxies /api/* to the backend container reachable on the docker
# bridge network as `plugtrack-api:9278`.
#
# /api/sync/stream is split out into its own location so SSE works
# (proxy_buffering off + long read timeout). The route itself lands in
# Phase 4 — wiring it now keeps nginx config stable across phases.

server {
    # Listen on both IPv4 and IPv6. The `nginx:alpine` entrypoint only
    # auto-adds the IPv6 listener to the *packaged* default conf, not our
    # custom one — without this, the container's healthcheck (which probes
    # `http://localhost/`, resolved to ::1 via /etc/hosts) gets connection
    # refused and the container is reported unhealthy even though it serves
    # fine on IPv4.
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers. `always` so they're emitted on error responses too.
    # CSP allows inline styles (Tailwind injects them) and data: images, but
    # forbids inline/3rd-party scripts, framing, and non-self connections —
    # the SPA only ever talks to its own /api on the same origin.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Standard gzip for text assets.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/xhtml+xml image/svg+xml;
    gzip_min_length 1024;

    # SSE endpoint — must not buffer or timeout.
    location /api/sync/stream {
        proxy_pass http://plugtrack-api:9278;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # All other API calls — straight reverse proxy.
    location /api/ {
        proxy_pass http://plugtrack-api:9278;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static asset cache. The Vite build emits content-hashed filenames
    # so we can cache aggressively.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        # nginx drops inherited add_header directives the moment a location
        # declares its own, so the server-level security headers must be
        # repeated here to keep them on hashed JS/CSS responses too.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    # SPA fallback — every non-asset, non-API path serves index.html so
    # client-side routing handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
