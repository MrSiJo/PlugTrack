# PlugTrack production compose — pulls pre-built images from GitHub
# Container Registry instead of building locally. Use this if you don't
# have the source checked out and just want to run the app.
#
# Usage:
#   1. Create a `.env` file alongside this compose file with at least:
#        APP_SECRET_KEY=<a-strong-random-secret-of-32+-chars>
#      Copy `.env.example` from the repo as a starting point if you have it.
#
#   2. (Optional) Override the tag — defaults to `latest`. To pin to a
#      specific release set:
#        export PLUGTRACK_TAG=v1.2.3
#      or write `PLUGTRACK_TAG=v1.2.3` into `.env`.
#
#   3. docker compose -f compose.ghcr.yaml pull
#      docker compose -f compose.ghcr.yaml up -d
#
# Data is stored in the named volumes `plugtrack-data`, `plugtrack-logs`,
# and `plugtrack-www`, managed by Docker. Use `docker volume ls` to find
# them on the host. To use bind mounts instead (e.g. for direct host
# access), replace each `volumes:` entry as in `compose.yaml`.

services:
  plugtrack-api:
    image: ghcr.io/mrsijo/plugtrack-api:${PLUGTRACK_TAG:-latest}
    container_name: plugtrack-api
    pull_policy: always
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      PYCUPRA_IMAGE_DIR: /app/www/pycupra
    ports:
      - "9278:9278"
    volumes:
      - plugtrack-data:/app/data
      - plugtrack-logs:/app/logs
      - plugtrack-www:/app/www
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9278/api/health', timeout=3).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  plugtrack-ui:
    image: ghcr.io/mrsijo/plugtrack-ui:${PLUGTRACK_TAG:-latest}
    container_name: plugtrack-ui
    pull_policy: always
    ports:
      - "9279:80"
    depends_on:
      plugtrack-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost/
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  plugtrack-data:
  plugtrack-logs:
  plugtrack-www:

networks:
  default:
    driver: bridge
