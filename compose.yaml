# PlugTrack production compose — pulls pre-built images from the
# GitHub Container Registry instead of building locally.
#
# This is the file `docker compose up -d` will pick up by default.
# Use `compose-dev.yaml` instead if you have the source checked out and
# want to build images locally (the deploy scripts under `scripts/`
# already do this for you).
#
# Usage:
#   1. Create a `.env` next to this file with at least:
#        APP_SECRET_KEY=<a-strong-random-secret-of-32+-chars>
#      Copy `.env.example` if you have the repo cloned, or generate one:
#        python -c "import secrets; print(secrets.token_urlsafe(48))"
#
#   2. (Optional) Pin a specific image tag — defaults to `latest`:
#        export PLUGTRACK_TAG=v1.2.3
#      or set `PLUGTRACK_TAG=v1.2.3` in `.env`.
#
#   3. docker compose pull
#      docker compose up -d
#
# Data lives in the Docker-managed named volumes `plugtrack-data` and
# `plugtrack-logs` (run `docker volume ls` to find them on the host).
# Replace each `volumes:` entry with bind mounts if you want direct
# host access.

services:
  plugtrack-api:
    image: ghcr.io/mrsijo/plugtrack-api:${PLUGTRACK_TAG:-latest}
    container_name: plugtrack-api
    pull_policy: always
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
    ports:
      # Bind the API to loopback only. The UI container reaches it over the
      # docker bridge as `plugtrack-api:9278` (see frontend/nginx.conf), so the
      # published port is purely for local debugging — it must NOT be exposed on
      # all interfaces, or it bypasses nginx's CSP/security headers. Front it
      # with a reverse proxy (or publish only the UI's 9279) for remote access.
      - "127.0.0.1:9278:9278"
    volumes:
      - plugtrack-data:/app/data
      - plugtrack-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9278/api/health', timeout=3).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  plugtrack-ui:
    image: ghcr.io/mrsijo/plugtrack-ui:${PLUGTRACK_TAG:-latest}
    container_name: plugtrack-ui
    pull_policy: always
    ports:
      - "9279:80"
    depends_on:
      plugtrack-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost/
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  plugtrack-data:
  plugtrack-logs:

networks:
  default:
    driver: bridge
